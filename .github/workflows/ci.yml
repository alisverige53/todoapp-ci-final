name: Java CI with MySQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testdb
          MYSQL_ROOT_PASSWORD: Mysql123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent -uroot -pMysql123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Wait for MySQL to start
        run: |
          for i in {1..30}; do
            nc -z localhost 3306 && echo "MySQL is up" && break || sleep 2;
          done
          nc -z localhost 3306 || exit 1

